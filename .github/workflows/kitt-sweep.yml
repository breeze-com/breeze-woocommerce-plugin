# KITT — nightly autonomous sweep (HARDENED Jun 16). Two-token split: the agent
# runs with a token scoped to THIS repo only (no hub), so an injected sweep run
# cannot write the shared kitt hub. Hub fetch (memory + sweep directive) and
# write-back use a separate hub-only token the agent never sees. Rails ride in
# this workflow. Org-agnostic (works on beamo-co and breeze-com).
# Cron staggered per repo + UTC. 18:xx UTC Sun-Thu = 02:xx SGT Mon-Fri.
name: KITT nightly sweep

on:
  schedule:
    - cron: "6 18 * * 0-4"
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read
  issues: read
  id-token: write

concurrency:
  group: kitt-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Repo name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_OUTPUT"

      - name: Mint hub token (fetch + write-back ONLY; never exposed to the agent)
        id: hub-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.KITT_APP_ID }}
          private-key: ${{ secrets.KITT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: kitt

      - name: Mint repo token (the agent runs with THIS — this repo only, no hub)
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.KITT_APP_ID }}
          private-key: ${{ secrets.KITT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ steps.repo.outputs.name }}

      - name: Backpressure check
        id: backpressure
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          OPEN=$(gh pr list -R "${{ github.repository }}" --label kitt --state open --json number --jq 'length')
          echo "open=$OPEN" >> "$GITHUB_OUTPUT"
          if [ "$OPEN" -ge 2 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::KITT sweep skipped — $OPEN open KITT PRs awaiting review."
          fi

      - uses: actions/checkout@v6
        if: steps.backpressure.outputs.skip != 'true'
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Write KITT permission policy (workflow-borne, run-scoped)
        if: steps.backpressure.outputs.skip != 'true'
        run: |
          mkdir -p "$RUNNER_TEMP/kitt"
          cat > "$RUNNER_TEMP/kitt/settings.json" <<'JSON'
          {
            "permissions": {
              "allow": [
                "Read", "Glob", "Grep", "Edit", "Write",
                "Bash(npm test:*)", "Bash(npm run:*)", "Bash(npm ci:*)", "Bash(npm install:*)",
                "Bash(npx vitest:*)", "Bash(npx jest:*)", "Bash(npx tsc:*)", "Bash(node:*)",
                "Bash(python3:*)", "Bash(pytest:*)", "Bash(python3 -m pytest:*)", "Bash(pip install:*)",
                "Bash(go test:*)", "Bash(cargo test:*)", "Bash(dotnet test:*)",
                "Bash(git status:*)", "Bash(git diff:*)", "Bash(git log:*)", "Bash(git show:*)",
                "Bash(git checkout:*)", "Bash(git switch:*)", "Bash(git branch:*)",
                "Bash(git add:*)", "Bash(git commit:*)", "Bash(git push:*)",
                "Bash(gh pr create:*)", "Bash(gh pr list:*)", "Bash(gh pr view:*)",
                "Bash(gh issue list:*)", "Bash(gh issue view:*)", "Bash(gh issue comment:*)"
              ],
              "deny": [
                "Edit(.github/workflows/**)", "Write(.github/workflows/**)", "Read(.github/workflows/**)",
                "Read(.env)", "Read(**/.env)", "Read(**/.env.*)", "Read(.env.*)",
                "Read(**/*.pem)", "Read(**/*.key)", "Read(**/*.p12)", "Read(**/*.pfx)",
                "Read(**/.npmrc)", "Read(**/.netrc)", "Read(**/service-account*.json)",
                "Read(**/*secret*)", "Read(**/*credential*)",
                "Bash(git merge:*)", "Bash(git push --force:*)", "Bash(git push -f:*)", "Bash(git remote:*)",
                "Bash(curl:*)", "Bash(wget:*)", "Bash(nc:*)", "Bash(ncat:*)", "Bash(scp:*)",
                "WebFetch", "WebSearch"
              ]
            }
          }
          JSON

      - name: Fetch KITT memory + sweep directive from hub
        if: steps.backpressure.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.hub-token.outputs.token }}
        run: |
          mkdir -p .kitt
          gh api "repos/${{ github.repository_owner }}/kitt/contents/memory/${{ steps.repo.outputs.name }}.md" \
            -H "Accept: application/vnd.github.raw" > .kitt/memory.md \
            || echo "(no memory file yet — first run)" > .kitt/memory.md
          cp .kitt/memory.md .kitt/memory.orig.md
          gh api "repos/${{ github.repository_owner }}/kitt/contents/prompts/sweep.md" \
            -H "Accept: application/vnd.github.raw" > .kitt/sweep.md \
            || echo "(no sweep directive found)" > .kitt/sweep.md

      - name: Run KITT sweep
        if: steps.backpressure.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          branch_prefix: "kitt/"
          track_progress: false
          prompt: |
            You are KITT on your nightly sweep of ${{ github.repository }}.
            Read .kitt/sweep.md and follow it exactly. Your memory for this
            repo is .kitt/memory.md. Open PRs with `gh pr create` (you are
            authenticated). One bounded PR maximum tonight; a clean skip is
            a valid outcome. Do not touch .github/workflows, secrets, deploy
            config, or the kitt hub repo.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 80
            --settings ${{ runner.temp }}/kitt/settings.json

      - name: Sync KITT memory + ledger to hub
        if: always() && steps.backpressure.outputs.skip != 'true' && steps.hub-token.outputs.token != ''
        env:
          GH_TOKEN: ${{ steps.hub-token.outputs.token }}
          REPO_NAME: ${{ steps.repo.outputs.name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          # Write-back is non-critical: a hiccup logs a ::warning:: but never reds the run.
          # Everything quoted; explicit sha if/else (no ${VAR:+} word-splitting).
          put_hub() {  # $1=hub-path  $2=local-file  $3=commit message
            local b64 sha
            b64=$(base64 -w0 < "$2") || { echo "::warning::base64 failed for $2"; return 0; }
            sha=$(gh api "repos/${OWNER}/kitt/contents/$1" --jq .sha 2>/dev/null || true)
            [ "$sha" = "null" ] && sha=""
            if [ -n "$sha" ]; then
              gh api -X PUT "repos/${OWNER}/kitt/contents/$1" -f message="$3" -f content="$b64" -f sha="$sha" >/dev/null \
                && echo "hub: updated $1" || echo "::warning::hub update failed for $1"
            else
              gh api -X PUT "repos/${OWNER}/kitt/contents/$1" -f message="$3" -f content="$b64" >/dev/null \
                && echo "hub: created $1" || echo "::warning::hub create failed for $1"
            fi
          }
          if [ -f .kitt/memory.md ] && ! cmp -s .kitt/memory.md .kitt/memory.orig.md; then
            put_hub "memory/${REPO_NAME}.md" .kitt/memory.md "KITT memory: ${REPO_NAME} (sweep ${{ github.run_id }})"
          fi
          if [ -s .kitt/ledger-row.md ]; then
            gh api "repos/${OWNER}/kitt/contents/ledger.md" -H "Accept: application/vnd.github.raw" > .kitt/ledger.md 2>/dev/null || : > .kitt/ledger.md
            cat .kitt/ledger-row.md >> .kitt/ledger.md
            put_hub "ledger.md" .kitt/ledger.md "KITT ledger: ${REPO_NAME} (sweep ${{ github.run_id }})"
          fi
