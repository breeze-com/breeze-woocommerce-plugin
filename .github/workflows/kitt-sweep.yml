# KITT — nightly autonomous sweep. Canonical template; deploy to target repos
# in phase 2 (plugin first). Stagger the cron per repo: plugin :00, modal-addon
# :40, unity +1h20 — keeps Console spend legible and runners uncontended.
# Cron is UTC: 18:00 UTC Sun-Thu = 02:00 SGT Mon-Fri (PRs land before SGT mornings).
name: KITT nightly sweep

on:
  schedule:
    - cron: "0 18 * * 0-4"
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read
  issues: read
  id-token: write

concurrency:
  group: kitt-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # schedule events carry no repository object in the payload; derive it.
      - name: Repo name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_OUTPUT"

      - name: Mint breeze-kitt App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.KITT_APP_ID }}
          private-key: ${{ secrets.KITT_APP_PRIVATE_KEY }}
          owner: breeze-com
          repositories: |
            ${{ steps.repo.outputs.name }}
            kitt

      # Backpressure, checked in shell BEFORE any model tokens burn:
      # >=2 open KITT PRs on this repo means reviewers are the bottleneck.
      - name: Backpressure check
        id: backpressure
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          OPEN=$(gh pr list -R "${{ github.repository }}" --label kitt --state open --json number --jq 'length')
          echo "open=$OPEN" >> "$GITHUB_OUTPUT"
          if [ "$OPEN" -ge 2 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::KITT sweep skipped — $OPEN open KITT PRs awaiting review."
          fi

      - uses: actions/checkout@v6
        if: steps.backpressure.outputs.skip != 'true'
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Fetch KITT memory + sweep directive from hub
        if: steps.backpressure.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          mkdir -p .kitt
          gh api "repos/breeze-com/kitt/contents/memory/${{ steps.repo.outputs.name }}.md" \
            -H "Accept: application/vnd.github.raw" > .kitt/memory.md \
            || echo "(no memory file yet — first run)" > .kitt/memory.md
          cp .kitt/memory.md .kitt/memory.orig.md
          gh api "repos/breeze-com/kitt/contents/prompts/sweep.md" \
            -H "Accept: application/vnd.github.raw" > .kitt/sweep.md

      - name: Run KITT sweep
        if: steps.backpressure.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          branch_prefix: "kitt/"
          track_progress: false
          prompt: |
            You are KITT on your nightly sweep of ${{ github.repository }}.
            Read .kitt/sweep.md and follow it exactly. Your memory for this
            repo is .kitt/memory.md. Open PRs with `gh pr create` (you are
            authenticated). One bounded PR maximum tonight; a clean skip is
            a valid outcome.
          claude_args: |
            --model claude-fable-5
            --max-turns 80

      # Write-back is deterministic workflow code, NOT agent privilege: KITT
      # edits .kitt/memory.md (and .kitt/ledger-row.md) in the workspace;
      # this step syncs them to the hub with the App token.
      - name: Sync KITT memory + ledger to hub
        if: always() && steps.backpressure.outputs.skip != 'true' && steps.app-token.outputs.token != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO_NAME: ${{ steps.repo.outputs.name }}
        run: |
          set -e
          if [ -f .kitt/memory.md ] && ! cmp -s .kitt/memory.md .kitt/memory.orig.md; then
            SHA=$(gh api "repos/breeze-com/kitt/contents/memory/${REPO_NAME}.md" --jq .sha 2>/dev/null || true)
            gh api -X PUT "repos/breeze-com/kitt/contents/memory/${REPO_NAME}.md" \
              -f message="KITT memory: ${REPO_NAME} (sweep ${{ github.run_id }})" \
              -f content="$(base64 -w0 < .kitt/memory.md)" \
              ${SHA:+-f sha=$SHA} > /dev/null
            echo "Memory synced."
          fi
          if [ -s .kitt/ledger-row.md ]; then
            gh api "repos/breeze-com/kitt/contents/ledger.md" -H "Accept: application/vnd.github.raw" > .kitt/ledger.md
            LSHA=$(gh api "repos/breeze-com/kitt/contents/ledger.md" --jq .sha)
            cat .kitt/ledger-row.md >> .kitt/ledger.md
            gh api -X PUT "repos/breeze-com/kitt/contents/ledger.md" \
              -f message="KITT ledger: ${REPO_NAME} (sweep ${{ github.run_id }})" \
              -f content="$(base64 -w0 < .kitt/ledger.md)" \
              -f sha="$LSHA" > /dev/null
            echo "Ledger row appended."
          fi
