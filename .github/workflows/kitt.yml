# CASE — mention/label trigger (HARDENED Jun 16). Two-token split: the agent
# runs with a token scoped to THIS repo only (no hub), so an injected run
# cannot write to the shared case hub. Hub fetch/write-back use a separate
# hub-only token the agent never sees. Rails ride in this workflow.
name: CASE

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [labeled]

permissions:
  contents: read
  pull-requests: read
  issues: read
  id-token: write

concurrency:
  group: case-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  case:
    if: >-
      (
        github.event_name == 'issues' &&
        github.event.label.name == 'case'
      ) || (
        github.event_name != 'issues' &&
        contains(github.event.comment.body, '/case') &&
        contains(fromJSON('["MEMBER","OWNER"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Mint hub token (fetch + write-back ONLY; never exposed to the agent)
        id: hub-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.KITT_APP_ID }}
          private-key: ${{ secrets.KITT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: case

      - name: Mint repo token (the agent runs with THIS — this repo only, no hub)
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.KITT_APP_ID }}
          private-key: ${{ secrets.KITT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Write CASE permission policy (workflow-borne, run-scoped)
        run: |
          mkdir -p "$RUNNER_TEMP/case"
          cat > "$RUNNER_TEMP/case/settings.json" <<'JSON'
          {
            "permissions": {
              "allow": [
                "Read", "Glob", "Grep", "Edit", "Write",
                "Bash(npm test:*)", "Bash(npm run:*)", "Bash(npm ci:*)", "Bash(npm install:*)",
                "Bash(npx vitest:*)", "Bash(npx jest:*)", "Bash(npx tsc:*)", "Bash(node:*)",
                "Bash(python3:*)", "Bash(pytest:*)", "Bash(python3 -m pytest:*)", "Bash(pip install:*)",
                "Bash(go test:*)", "Bash(cargo test:*)", "Bash(dotnet test:*)",
                "Bash(git status:*)", "Bash(git diff:*)", "Bash(git log:*)", "Bash(git show:*)",
                "Bash(git checkout:*)", "Bash(git switch:*)", "Bash(git branch:*)",
                "Bash(git add:*)", "Bash(git commit:*)", "Bash(git push:*)",
                "Bash(gh pr create:*)", "Bash(gh pr list:*)", "Bash(gh pr view:*)",
                "Bash(gh issue list:*)", "Bash(gh issue view:*)", "Bash(gh issue comment:*)"
              ],
              "deny": [
                "Edit(.github/workflows/**)", "Write(.github/workflows/**)", "Read(.github/workflows/**)",
                "Read(.env)", "Read(**/.env)", "Read(**/.env.*)", "Read(.env.*)",
                "Read(**/*.pem)", "Read(**/*.key)", "Read(**/*.p12)", "Read(**/*.pfx)",
                "Read(**/.npmrc)", "Read(**/.netrc)", "Read(**/service-account*.json)",
                "Read(**/*secret*)", "Read(**/*credential*)",
                "Bash(git merge:*)", "Bash(git push --force:*)", "Bash(git push -f:*)", "Bash(git remote:*)",
                "Bash(curl:*)", "Bash(wget:*)", "Bash(nc:*)", "Bash(ncat:*)", "Bash(scp:*)",
                "WebFetch", "WebSearch"
              ]
            }
          }
          JSON

      - name: Fetch CASE memory from hub
        env:
          GH_TOKEN: ${{ steps.hub-token.outputs.token }}
        run: |
          mkdir -p .case
          gh api "repos/${{ github.repository_owner }}/case/contents/memory/${{ github.event.repository.name }}.md" \
            -H "Accept: application/vnd.github.raw" > .case/memory.md \
            || echo "(no memory file yet — first run)" > .case/memory.md
          cp .case/memory.md .case/memory.orig.md

      - name: Run CASE
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          trigger_phrase: "/case"
          label_trigger: "case"
          branch_prefix: "case/"
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 50
            --settings ${{ runner.temp }}/case/settings.json
            --append-system-prompt "You are CASE, a governed coding agent. You open PRs for human review and NEVER merge; branch prefix 'case/'. Do not touch .github/workflows, secrets, deploy config, or the case hub repo. If your task came from an issue (label trigger) and you completed code work: after pushing your branch you MUST open the pull request yourself with 'gh pr create' (allowlisted), titled '[CASE] ...' and including 'Closes #<issue>'. Never finish by offering a compare/create-PR link."

      - name: Sync CASE memory + ledger to hub
        if: always() && steps.hub-token.outputs.token != ''
        env:
          GH_TOKEN: ${{ steps.hub-token.outputs.token }}
          REPO_NAME: ${{ github.event.repository.name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          # Write-back is non-critical: a hiccup logs a ::warning:: but never reds the run.
          # Everything quoted; explicit sha if/else (no ${VAR:+} word-splitting).
          put_hub() {  # $1=hub-path  $2=local-file  $3=commit message
            local b64 sha
            b64=$(base64 -w0 < "$2") || { echo "::warning::base64 failed for $2"; return 0; }
            sha=$(gh api "repos/${OWNER}/case/contents/$1" --jq .sha 2>/dev/null || true)
            [ "$sha" = "null" ] && sha=""
            if [ -n "$sha" ]; then
              gh api -X PUT "repos/${OWNER}/case/contents/$1" -f message="$3" -f content="$b64" -f sha="$sha" >/dev/null \
                && echo "hub: updated $1" || echo "::warning::hub update failed for $1"
            else
              gh api -X PUT "repos/${OWNER}/case/contents/$1" -f message="$3" -f content="$b64" >/dev/null \
                && echo "hub: created $1" || echo "::warning::hub create failed for $1"
            fi
          }
          if [ -f .case/memory.md ] && ! cmp -s .case/memory.md .case/memory.orig.md; then
            put_hub "memory/${REPO_NAME}.md" .case/memory.md "CASE memory: ${REPO_NAME} (run ${{ github.run_id }})"
          fi
          if [ -s .case/ledger-row.md ]; then
            gh api "repos/${OWNER}/case/contents/ledger.md" -H "Accept: application/vnd.github.raw" > .case/ledger.md 2>/dev/null || : > .case/ledger.md
            cat .case/ledger-row.md >> .case/ledger.md
            put_hub "ledger.md" .case/ledger.md "CASE ledger: ${REPO_NAME} (run ${{ github.run_id }})"
          fi
