name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        run: |
          SLUG="breeze-payment-gateway"
          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p /tmp/${SLUG}
          rsync -r --exclude-from=".distignore" . /tmp/${SLUG}/

          cd /tmp
          zip -r "${GITHUB_WORKSPACE}/${SLUG}-${VERSION}.zip" ${SLUG}/

      - name: Create GitHub Release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          files: "breeze-payment-gateway-${{ steps.version.outputs.version }}.zip"
          generate_release_notes: true
          body: |
            ## Installation

            Download **`breeze-payment-gateway-${{ steps.version.outputs.version }}.zip`** from the **Assets** section below and upload it via *WordPress → Plugins → Add New → Upload Plugin*.

            > **Do not use** the auto-generated *"Source code (zip)"* / *"Source code (tar.gz)"* links at the bottom of this page. Those are raw git archives that unpack to `breeze-woocommerce-plugin-${{ steps.version.outputs.version }}/`, which doesn't match the plugin's installed folder name (`breeze-payment-gateway/`). Uploading the wrong zip creates a duplicate plugin entry next to your existing install instead of upgrading it.
